<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gender Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    height:100vh;
    background:linear-gradient(135deg,#ffd6ec,#ffeef7);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins', sans-serif;
    overflow: hidden;
    touch-action: none;
}
.wrapper{ text-align:center; width: 100%; padding: 20px; }
.title{ font-size: 26px; margin-bottom: 20px; color: #ff3f9f; font-weight: 700; }

/* 카드의 높이를 명시적으로 지정하여 캔버스가 길을 잃지 않게 합니다 */
.card{
    position: relative;
    width: 320px; /* 모바일 안정성을 위해 가로폭 살짝 조정 */
    height: 320px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    background: white;
}
.result{
    position: absolute;
    top:0; left:0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
}
.reveal-text{ font-size: 28px; font-weight: 700; color: #ff3f9f; text-align: center; }
.reveal-text span{ font-size: 16px; display: block; margin-top: 4px; }
.baby-photo{
    margin-top: 15px;
    width: 220px;
    border-radius: 12px;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.8s ease;
}
.baby-photo.show{ opacity: 1; transform: scale(1); }

canvas{
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    touch-action: none;
}
.hint{ margin-top: 20px; font-size: 14px; color: #ff7fbf; }
</style>
</head>
<body>

<div class="wrapper">
    <div class="title">Scratch to Reveal 👶</div>
    <div class="card" id="card">
        <div class="result">
            <div class="reveal-text">
                🎀 It's a Girl!
                <span>딸입니다</span>
            </div>
            <img src="girl.png" class="baby-photo" id="babyPhoto" />
        </div>
        <canvas id="scratch"></canvas>
    </div>
    <div class="hint">손가락으로 슥슥 긁어보세요 ✨</div>
</div>

<script>
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const card = document.getElementById("card");
const babyPhoto = document.getElementById("babyPhoto");

let drawing = false;
let revealed = false;

// 부드러운 선을 그리기 위해 이전 좌표를 저장할 변수
let lastX, lastY;

// 1. 캔버스 초기화 및 리사이징 대응 (기존과 거의 동일)
function init Canvas() {
    const rect = card.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;

    // 디바이스 픽셀 비율 대응
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.scale(dpr, dpr);

    // 덮개 그리기 (핑크 계열 그라데이션으로 더 예쁘게 바꿨어요)
    const gradient = ctx.createLinearGradient(0, 0, width, height);
    gradient.addColorStop(0, '#ffccdf'); // 연한 핑크
    gradient.addColorStop(1, '#ffafcc'); // 진한 핑크
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);

    // 안내 텍스트
    ctx.font = "bold 20px sans-serif";
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("여기를 슥슥 긁어봐요!", width / 2, height / 2);
    
    // 중요: 캔버스 초기화 후 드로잉 모드 설정 (긁어내기)
    ctx.globalCompositeOperation = "destination-out";
}

// 좌표 가져오기 함수
function getCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

// 2. 부드러운 긁기 로직 (핵심 수정 부분)
function scratchMove(e) {
    if (!drawing || revealed) return;
    
    const { x, y } = getCoords(e);

    // 그리기 설정
    ctx.lineWidth = 45; // 펜 굵기 (원하는 대로 조절 가능)
    ctx.lineCap = "round"; // 선의 끝을 둥글게 (부드러움의 핵심)
    ctx.lineJoin = "round"; // 선이 꺾이는 부분을 둥글게

    ctx.beginPath();
    // 이전 좌표가 있다면 선으로 연결
    if (lastX && lastY) {
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
    } else {
        // 첫 번째 점일 때는 원으로 시작 (터치 시작 시)
        ctx.arc(x, y, 22, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // 현재 좌표를 다음 긁기를 위해 저장
    lastX = x;
    lastY = y;

    // 가끔씩만 체크해서 성능 최적화
    if (Math.random() > 0.9) checkPercent();
}

// 긁기 시작 (좌표 초기화)
function scratchStart(e) {
    drawing = true;
    const { x, y } = getCoords(e);
    lastX = x; // 시작 좌표 저장
    lastY = y;
    scratchMove(e); // 시작하자마자 점 하나 찍기
}

// 긁기 종료 (좌표 끊기)
function scratchEnd() {
    drawing = false;
    lastX = null; // 좌표 초기화 (그래야 다음 긁기 때 선이 안 이어짐)
    lastY = null;
}

// 퍼센트 체크 및 결과 공개 (기존과 동일)
function checkPercent() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let count = 0;
    for (let i = 3; i < imageData.data.length; i += 4) {
        if (imageData.data[i] === 0) count++;
    }
    // 35% 이상 긁히면 자동 공개
    if ((count / (canvas.width * canvas.height)) > 0.35) {
        reveal();
    }
}

function reveal() {
    if (revealed) return;
    revealed = true;
    canvas.style.transition = "opacity 0.8s";
    canvas.style.opacity = "0";
    setTimeout(() => canvas.style.display = "none", 800);
    
    babyPhoto.classList.add("show");
    confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 },
        colors: ['#ff6fae', '#ff99cc', '#ffffff'] // 핑크색 계열
    });
}

// 이벤트 리스너 연결 (수정된 함수명 반영)
canvas.addEventListener("mousedown", scratchStart);
window.addEventListener("mouseup", scratchEnd);
canvas.addEventListener("mousemove", scratchMove);

canvas.addEventListener("touchstart", (e) => {
    e.preventDefault(); // 스크롤 방지
    scratchStart(e);
}, { passive: false });
canvas.addEventListener("touchend", scratchEnd);
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    scratchMove(e);
}, { passive: false });

// 로딩 완료 후 초기화
window.addEventListener('load', initCanvas);
window.addEventListener('resize', initCanvas);
if (document.readyState === 'complete') initCanvas();
</script>

</body>
</html>
