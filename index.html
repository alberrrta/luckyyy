<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gender Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    height:100vh;
    background:linear-gradient(135deg,#ffd6ec,#ffeef7);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins', sans-serif;
    overflow: hidden;
    touch-action: none;
}
.wrapper{ text-align:center; width: 100%; padding: 20px; }
.title{ font-size: 26px; margin-bottom: 20px; color: #ff3f9f; font-weight: 700; }

/* 카드의 높이를 명시적으로 지정하여 캔버스가 길을 잃지 않게 합니다 */
.card{
    position: relative;
    width: 320px; /* 모바일 안정성을 위해 가로폭 살짝 조정 */
    height: 320px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    background: white;
}
.result{
    position: absolute;
    top:0; left:0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
}
.reveal-text{ font-size: 28px; font-weight: 700; color: #ff3f9f; text-align: center; }
.reveal-text span{ font-size: 16px; display: block; margin-top: 4px; }
.baby-photo{
    margin-top: 15px;
    width: 220px;
    border-radius: 12px;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.8s ease;
}
.baby-photo.show{ opacity: 1; transform: scale(1); }

canvas{
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    touch-action: none;
}
.hint{ margin-top: 20px; font-size: 14px; color: #ff7fbf; }
</style>
</head>
<body>

<div class="wrapper">
    <div class="title">Scratch to Reveal 👶</div>
    <div class="card" id="card">
        <div class="result">
            <div class="reveal-text">
                🎀 It's a Girl!
                <span>딸입니다</span>
            </div>
            <img src="girl.png" class="baby-photo" id="babyPhoto" />
        </div>
        <canvas id="scratch"></canvas>
    </div>
    <div class="hint">손가락으로 슥슥 긁어보세요 ✨</div>
</div>

<script>
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const card = document.getElementById("card");
const babyPhoto = document.getElementById("babyPhoto");

let drawing = false;
let revealed = false;
let lastX, lastY; // 하트를 부드럽게 잇기 위한 이전 좌표

function init() {
    const rect = card.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;

    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.scale(dpr, dpr);

    // 덮개 그리기 (핑크빛이 살짝 도는 은색으로 변경)
    ctx.fillStyle = "#CECECE";
    ctx.fillRect(0, 0, width, height);

    ctx.font = "bold 20px Arial";
    ctx.fillStyle = "#ff6fae";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Scratch Here!", width / 2, height / 2);
}

// 하트 모양을 그리는 핵심 함수
function drawHeart(x, y, size) {
    ctx.beginPath();
    // 시작점 (하트의 위쪽 중앙 V자 부분)
    ctx.moveTo(x, y + size * 0.3);
    // 왼쪽 볼 (더 높고 넓게 곡선 처리)
    ctx.bezierCurveTo(x - size * 0.4, y - size * 0.1, x - size * 0.9, y + size * 0.2, x, y + size);
    // 오른쪽 볼 (대칭되게 곡선 처리)
    ctx.bezierCurveTo(x + size * 0.9, y + size * 0.2, x + size * 0.4, y - size * 0.1, x, y + size * 0.3);
    
    ctx.fill();
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function scratch(e) {
    if (!drawing || revealed) return;
    const pos = getPos(e);

    ctx.globalCompositeOperation = "destination-out";
    
    // 점과 점 사이를 하트로 채워 부드럽게 표현
    const distance = lastX ? Math.hypot(pos.x - lastX, pos.y - lastY) : 0;
    const steps = Math.max(Math.floor(distance / 5), 1); // 5픽셀 간격으로 하트 생성

    for (let i = 0; i < steps; i++) {
        const lerpX = lastX + (pos.x - lastX) * (i / steps);
        const lerpY = lastY + (pos.y - lastY) * (i / steps);
        // 하트 크기를 30정도로 설정 (살짝 위로 치우쳐 그려지므로 보정)
        drawHeart(lerpX, lerpY - 15, 35); 
    }

    lastX = pos.x;
    lastY = pos.y;

    if (Math.random() > 0.9) checkPercent();
}

function checkPercent() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let count = 0;
    for (let i = 3; i < imageData.data.length; i += 4) {
        if (imageData.data[i] === 0) count++;
    }
    if ((count / (canvas.width * canvas.height)) > 0.4) reveal();
}

function reveal() {
    if (revealed) return;
    revealed = true;
    canvas.style.transition = "opacity 0.8s";
    canvas.style.opacity = "0";
    setTimeout(() => canvas.style.display = "none", 800);
    
    babyPhoto.classList.add("show");
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ff6fae', '#ff99cc', '#ffffff']
    });
}

// 이벤트 연결
canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    scratch(e);
});
window.addEventListener("mouseup", () => { drawing = false; lastX = null; lastY = null; });
canvas.addEventListener("mousemove", scratch);

canvas.addEventListener("touchstart", (e) => {
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    scratch(e);
}, { passive: false });
canvas.addEventListener("touchend", () => { drawing = false; lastX = null; lastY = null; });
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    scratch(e);
}, { passive: false });

window.onload = init;
if (document.readyState === 'complete') init();
</script>

</body>
</html>
