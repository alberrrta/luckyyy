<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gender Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    height:100vh;
    background:linear-gradient(135deg,#ffd6ec,#ffeef7);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins', sans-serif;
    overflow: hidden; /* 스크롤 방지 */
    touch-action: none; /* 브라우저 기본 제스처 방지 */
}

.wrapper{
    text-align:center;
    width: 100%;
    padding: 20px;
}

.title{
    font-size: clamp(20px, 5vw, 28px);
    margin-bottom: 20px;
    color: #ff3f9f;
    font-weight: 700;
}

.card{
    position: relative;
    width: 420px;
    max-width: 100%;
    height: 320px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    background: white;
}

.result{
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
}

.reveal-text{
    font-size: 30px;
    font-weight: 700;
    color: #ff3f9f;
}

.reveal-text span{
    font-size: 16px;
    display: block;
    margin-top: 4px;
}

.baby-photo{
    margin-top: 14px;
    width: 240px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.baby-photo.show{
    opacity: 1;
    transform: scale(1);
}

canvas{
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    cursor: crosshair;
    touch-action: none;
    transition: opacity 0.6s ease;
}

.hint{
    margin-top: 20px;
    font-size: 14px;
    color: #ff7fbf;
    font-weight: 500;
}

.footer{
    margin-top: 10px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="title">Scratch to Reveal 👶</div>

    <div class="card" id="card">
        <div class="result">
            <div class
