<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gender Reveal</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#ffeaf4);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.container{
    width:420px;
    height:420px;
    position:relative;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    background:white;
}

.reveal{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.title{
    font-size:42px;
    font-weight:800;
    color:#ff4fa3;
    margin-bottom:10px;
}

.subtitle{
    font-size:22px;
    color:#ff7fbf;
}

.ultrasound{
    width:220px;
    margin-top:20px;
    border-radius:10px;
}

canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    touch-action:none; /* 모바일 스크롤 방지 */
}

.scratchText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
    color:white;
    font-weight:700;
    pointer-events:none;
    transition:opacity .3s ease;
}

</style>
</head>


<body>

<div class="container">

<div class="reveal">

<div class="title">🎀 It's a Girl!</div>
<div class="subtitle">딸입니다</div>

<img src="girl.png" class="ultrasound">

</div>

<canvas id="scratch"></canvas>
<div class="scratchText" id="scratchText">Scratch me</div>

</div>


<script>

const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");
const scratchText = document.getElementById("scratchText");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

ctx.fillStyle = "#b5b5b5";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation = "destination-out";

let isDrawing=false;
let scratched=false;

canvas.addEventListener("mousedown",()=>isDrawing=true);
canvas.addEventListener("mouseup",()=>isDrawing=false);
canvas.addEventListener("mouseleave",()=>isDrawing=false);

canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    isDrawing=true;
},{passive:false});

canvas.addEventListener("touchend",()=>isDrawing=false);

canvas.addEventListener("touchmove",(e)=>{
    e.preventDefault();
    scratch(e);
},{passive:false});

function scratch(e){

if(!isDrawing) return;

let rect=canvas.getBoundingClientRect();
let x,y;

if(e.touches){
x=e.touches[0].clientX-rect.left;
y=e.touches[0].clientY-rect.top;
}else{
x=e.clientX-rect.left;
y=e.clientY-rect.top;
}

ctx.beginPath();
ctx.arc(x,y,25,0,Math.PI*2);
ctx.fill();

// 처음 긁을 때 텍스트 숨기기
if(!scratched){
    scratched=true;
    scratchText.style.opacity = 0;
}

}

</script>

</body>
</html>
