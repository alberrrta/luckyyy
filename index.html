<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gender Reveal</title>
<meta property="og:image" content="https://alberrrta.github.io/luckyyy/thumb.jpg" />
<meta property="og:image:width" content="800" />
<meta property="og:image:height" content="400" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    height:100vh;
    background:linear-gradient(135deg,#ffd6ec,#ffeef7);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins', sans-serif;
    overflow: hidden;
    touch-action: none;
}
.wrapper{ text-align:center; width: 100%; padding: 20px; }
.title{ font-size: 26px; margin-bottom: 20px; color: #ff3f9f; font-weight: 700; }

.card{
    position: relative;
    width: 320px; 
    height: 320px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    background: white;
}
.result{
    position: absolute;
    top:0; left:0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
}

/* 문구도 처음에는 안 보이게 설정 */
.reveal-text{ 
    font-size: 28px; 
    font-weight: 700; 
    color: #ff3f9f; 
    text-align: center;
    opacity: 0; 
    transform: translateY(-10px);
    transition: all 0.8s ease; 
}

.reveal-text span{ font-size: 16px; display: block; margin-top: 4px; }

.baby-photo{
    margin-top: 15px;
    width: 220px;
    border-radius: 12px;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.8s ease 0.2s; /* 텍스트보다 0.2초 늦게 등장 */
}

/* show 클래스가 붙으면 문구와 사진이 나타남 */
.reveal-text.show, .baby-photo.show {
    opacity: 1;
    transform: translate(0) scale(1);
}

canvas{
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    touch-action: none;
}
.hint{ margin-top: 20px; font-size: 14px; color: #ff7fbf; }
</style>
</head>
<body>

<div class="wrapper">
    <div class="title">Scratch to Reveal 👶</div>
    <div class="card" id="card">
        <div class="result">
            <div class="reveal-text" id="revealText">
                🎀 It's a Girl!
                <span>아빠 닮게 해주세요 🙏🏻</span>
            </div>
            <img src="girl.png" class="baby-photo" id="babyPhoto" />
        </div>
        <canvas id="scratch"></canvas>
    </div>
    <div class="hint">손가락으로 슥슥 긁어보세요 ✨</div>
</div>

<script>
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const card = document.getElementById("card");
const babyPhoto = document.getElementById("babyPhoto");
const revealText = document.getElementById("revealText");

let drawing = false;
let revealed = false;
let lastX, lastY;

function init() {
    const rect = card.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;

    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.scale(dpr, dpr);

    ctx.fillStyle = "#CECECE";
    ctx.fillRect(0, 0, width, height);

    ctx.font = "bold 20px Arial";
    ctx.fillStyle = "#ff6fae";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Scratch Here!", width / 2, height / 2);
}

function drawHeart(x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y + size * 0.2);
    ctx.bezierCurveTo(x - size * 0.3, y - size * 0.2, x - size * 1.0, y + size * 0.15, x, y + size * 0.95);
    ctx.bezierCurveTo(x + size * 1.0, y + size * 0.15, x + size * 0.3, y - size * 0.2, x, y + size * 0.2);
    ctx.fill();
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function scratch(e) {
    if (!drawing || revealed) return;
    const pos = getPos(e);

    ctx.globalCompositeOperation = "destination-out";
    
    const distance = lastX ? Math.hypot(pos.x - lastX, pos.y - lastY) : 0;
    const steps = Math.max(Math.floor(distance / 5), 1);

    for (let i = 0; i < steps; i++) {
        const lerpX = lastX + (pos.x - lastX) * (i / steps);
        const lerpY = lastY + (pos.y - lastY) * (i / steps);
        drawHeart(lerpX, lerpY - 15, 35); 
    }

    lastX = pos.x;
    lastY = pos.y;

    if (Math.random() > 0.9) checkPercent();
}

function checkPercent() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let count = 0;
    for (let i = 3; i < imageData.data.length; i += 4) {
        if (imageData.data[i] === 0) count++;
    }
    if ((count / (canvas.width * canvas.height)) > 0.4) reveal();
}

function reveal() {
    if (revealed) return;
    revealed = true;
    canvas.style.transition = "opacity 0.8s";
    canvas.style.opacity = "0";
    setTimeout(() => canvas.style.display = "none", 800);
    
    // 문구와 사진에 동시에 show 클래스 추가
    revealText.classList.add("show");
    babyPhoto.classList.add("show");

    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ff6fae', '#ff99cc', '#ffffff']
    });
}

canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    scratch(e);
});
window.addEventListener("mouseup", () => { drawing = false; lastX = null; lastY = null; });
canvas.addEventListener("mousemove", scratch);

canvas.addEventListener("touchstart", (e) => {
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    scratch(e);
}, { passive: false });
canvas.addEventListener("touchend", () => { drawing = false; lastX = null; lastY = null; });
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    scratch(e);
}, { passive: false });

window.onload = init;
if (document.readyState === 'complete') init();
</script>

</body>
</html>
