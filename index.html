<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gender Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
height:100vh;
background:linear-gradient(135deg,#ffd6ec,#ffeef7);
display:flex;
align-items:center;
justify-content:center;
font-family:'Poppins',sans-serif;
overflow: hidden; /* 모바일 스크롤 방지 */
}

.wrapper{
text-align:center;
}

.title{
font-size:28px;
margin-bottom:20px;
color:#ff3f9f;
font-weight:700;
}

.card{
position:relative;
width:420px;
max-width: 90vw; /* 모바일 대응 */
height:320px;
border-radius:16px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
background:white;
}

.result{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:700;
color:#ff3f9f;
z-index:1;
padding:10px;
}

.reveal-text{
font-size:34px;
}

.reveal-text span{
font-size:16px;
display:block;
margin-top:4px;
}

.baby-photo{
margin-top:14px;
width:260px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
opacity:0;
transform:scale(0.9);
transition:all .6s ease;
}

.baby-photo.show{
opacity:1;
transform:scale(1);
}

canvas{
position:absolute;
top:0;
left:0;
z-index:2;
touch-action: none; /* 모바일 터치 시 화면 밀림 방지 */
transition: opacity 0.8s ease; /* 투명해지는 애니메이션 */
}

.hint{
margin-top:16px;
font-size:14px;
color:#777;
}

.footer{
margin-top:14px;
font-size:12px;
color:#aaa;
}

</style>
</head>
<body>

<div class="wrapper">

<div class="title">Scratch to Reveal 👶</div>

<div class="card" id="card">

<div class="result">

<div class="reveal-text">
🎀 It's a Girl!
<span>딸입니다</span>
</div>

<img src="girl.png" class="baby-photo" id="babyPhoto" />

</div>

<canvas id="scratch"></canvas>

</div>

<div class="hint">화면을 긁어보세요 ✨</div>
<div class="footer">Gender Reveal</div>

</div>

<script>

const canvas = document.getElementById("scratch")
const ctx = canvas.getContext("2d")
const card = document.getElementById("card")
const babyPhoto = document.getElementById("babyPhoto")

const width = card.offsetWidth
const height = card.offsetHeight

canvas.width = width
canvas.height = height

// 배경색 및 안내 문구
ctx.fillStyle = "#bdbdbd"
ctx.fillRect(0,0,width,height)

ctx.fillStyle="white"
ctx.font="bold 26px Poppins"
ctx.textAlign="center"
ctx.fillText("Scratch Here",width/2,height/2)

let drawing=false
let revealed=false

function scratch(x,y){
ctx.globalCompositeOperation="destination-out"
ctx.beginPath()
ctx.arc(x,y,24,0,Math.PI*2)
ctx.fill()
}

function getPercent(){
const pixels=ctx.getImageData(0,0,width,height)
let transparent=0

for(let i=3;i<pixels.data.length;i+=4){
if(pixels.data[i]===0) transparent++
}

return (transparent / (width * height)) * 100
}

function revealEffect(){
if(revealed) return
revealed=true

// 캔버스 서서히 사라지게 함
canvas.style.opacity = "0"
setTimeout(() => {
    canvas.style.display = "none"
}, 800)

confetti({
particleCount:180,
spread:120,
origin:{y:0.6},
colors: ['#ff6fae', '#ff99cc', '#ffc1de'] // 핑크색 계열 폭죽
})

babyPhoto.classList.add("show")
}

// PC 이벤트
canvas.addEventListener("mousedown",()=>drawing=true)
window.addEventListener("mouseup",()=>drawing=false) // 마우스 떼는 건 윈도우 기준이 안전

canvas.addEventListener("mousemove",e=>{
if(!drawing) return
const rect=canvas.getBoundingClientRect()
const x=e.clientX-rect.left
const y=e.clientY-rect.top
scratch(x,y)
if(getPercent()>35) revealEffect()
})

// 모바일 이벤트
canvas.addEventListener("touchstart",(e)=>{
    drawing=true
    const rect=canvas.getBoundingClientRect()
    const x=e.touches[0].clientX-rect.left
    const y=e.touches[0].clientY-rect.top
    scratch(x,y)
})
canvas.addEventListener("touchend",()=>drawing=
